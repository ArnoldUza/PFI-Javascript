<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>TP2</title>
    <link rel="stylesheet" href="café.css">
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous">
        </script>
</head>

<body>
    <div class="entete">
        <h1>Café chez Homer</h1>
    </div>
    <div class="conteneur">
        <div class="gauche">
            <div id="menu">
                <!-- Liste déroulante des catégories -->
            </div>
            <div id="item" class="item_liste">
             <ul>
                    <li>
                        <a href="images/sandwich.jpg">
                            <img src="images/sandwich.jpg">
                            <span>Burrito matin - $10</span>
                        </a>
                    </li>
                </ul> 
            </div>
        </div>
        <div class="droite">
            <form action="http://localhost:4242/cafehomer/commandes" method="post">
                <fieldset>
                    <legend>Identification</legend>
                    <div>
                       <!-- Identification du client -->
                    <div>
                        <label for="nom">Nom complet:</label>
                        <input id="nom" name="nom" type="text" required minlength="3" maxlength="25">
                        <span class="erreur" id="erreur-nom"></span>
                    </div>
                    <div>
                        <label for="postal">Code postal:</label>
                        <input id="postal" name="postal" type="text">
                        <span class="erreur" id="erreur-postal"></span>
                    </div>
                    <div>
                        <label for="courriel">Courriel:</label>
                        <input id="courriel" name="courriel" type="email" required>
                        <span class="erreur" id="erreur-courriel"></span>
                    </div>
                    <div>
                        <label for="carte">Carte de crédit:</label>
                        <input id="carte" name="carte" type="text">
                        <span class="erreur" id="erreur-carte"></span>
                    </div>
                    <div>
                        <label for="code">Code:</label>
                        <input id="code" name="code" type="text" required minlength="3" maxlength="3">
                        <span class="erreur" id="erreur-code"></span>
                    </div>
                    <div>
                        <label for="expiration">Expiration:</label>
                        <input id="expiration" name="expiration" type="month" required>
                        <span class="erreur" id="erreur-expiration"></span>
                    </div>
                    </div>
                    <input id="apporter" name="apporter" type="checkbox">
                    <label for="apporter">Pour apporter</label>
                </fieldset>
                <fieldset>
                    <legend>La commande</legend>
                    <table>
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Quantité</th>
                                <th>Prix</th>
                                <th>Total</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="item_commande">
                            <!-- Ligne de commande -->
                            <tr>
                                    <td><label>Croissant</label></td>
                                    <td><input name="Croissant" type="number" min="1" max="99"></td>
                                    <td>2.5</td>
                                    <td>2.5</td>
                                </tr> 
                        </tbody>
                        <tfoot>
                            <tr>
                                <th colspan="3">Sous total:</th>
                                <td id="total">$0.00</td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </fieldset>
                <p>
                    <input type="submit" value="Commander">
                    <input type="reset" value="Annuler">
                </p>
            </form>
        </div>
    </div>
    <div class="pied_de_page">
        <span>version 1.0.0</span>
    </div>
    <script src="scripts/tp2.js"></script>
</body>

</html>
